{% extends "base.html" %}
{% block title %}Register - FinTrack{% endblock %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height:100vh;">
    <div class="col-md-5">
        <div class="text-center mb-4">
            <h2 class="fw-bold"><span style="color:#6c63ff;">Fin</span>Track</h2>
            <p class="text-muted">Create your free account to get started.</p>
        </div>
        <div class="card border-0 shadow-sm p-4">
            <a href="{{ url_for('google.login') }}" class="btn btn-outline-secondary w-100 mb-3 d-flex align-items-center justify-content-center gap-2 py-2">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="20" height="20" alt="Google">
                <span>Continue with Google</span>
            </a>
            <div class="d-flex align-items-center my-3">
                <hr class="flex-grow-1"><span class="mx-2 text-muted small">or</span><hr class="flex-grow-1">
            </div>
            <form method="POST" action="/register">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Full Name</label>
                    <input type="text" name="full_name" class="form-control form-control-lg" placeholder="Your full name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email Address</label>
                    <input type="email" name="email" class="form-control form-control-lg" placeholder="you@example.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control form-control-lg" placeholder="Create a strong password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-lg fw-bold">Create Account</button>
            </form>
        </div>
        <p class="text-center mt-3 text-muted">
            Already have an account? <a href="/login" style="color:#6c63ff;">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
