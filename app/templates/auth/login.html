{% extends "base.html" %}
{% block content %}

<style>
.auth-bg {
  min-height: 100vh;
  background: linear-gradient(135deg, #e8f3f8 0%, #dceaf2 50%, #cfe2ec 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
}
.auth-card {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 20px 50px rgba(30,58,95,.12);
  padding: 2rem 2.2rem;
  width: 100%;
  max-width: 460px;
}
.auth-brand {
  color: #1e3a5f;
  font-weight: 800;
  font-size: 2rem;
  text-align: center;
}
.auth-brand i { color: #22d3ee; }
.auth-sub {
  color: #64748b;
  text-align: center;
  font-size: .95rem;
  margin-bottom: 1.5rem;
}
.btn-google {
  width: 100%;
  background: #fff;
  border: 1.5px solid #e2e8f0;
  border-radius: 10px;
  padding: 10px;
  font-weight: 500;
  color: #334155;
  transition: .2s;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.btn-google:hover { border-color: #22d3ee; background: #f0fafd; }
.divider {
  display: flex; align-items: center;
  color: #94a3b8; font-size: .85rem;
  margin: 1.2rem 0;
}
.divider::before, .divider::after {
  content: ""; flex: 1; height: 1px; background: #e2e8f0;
}
.divider span { padding: 0 .8rem; }
.auth-label {
  font-weight: 600; color: #1e3a5f;
  font-size: .9rem; margin-bottom: .35rem;
}
.auth-input {
  width: 100%;
  border: 1.5px solid #e2e8f0;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: .95rem;
  background: #f8fafc;
  transition: .2s;
}
.auth-input:focus {
  outline: none;
  border-color: #22d3ee;
  background: #fff;
  box-shadow: 0 0 0 3px rgba(34,211,238,.15);
}
.btn-login {
  width: 100%;
  background: linear-gradient(135deg, #1e3a5f 0%, #2a5a72 100%);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 12px;
  font-weight: 600;
  font-size: 1rem;
  margin-top: .5rem;
  transition: .2s;
}
.btn-login:hover {
  background: linear-gradient(135deg, #22d3ee 0%, #06b6d4 100%);
  color: #003344;
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(34,211,238,.3);
}
.auth-foot {
  text-align: center;
  color: #64748b;
  font-size: .9rem;
  margin-top: 1.2rem;
}
.auth-foot a { color: #1e3a5f; font-weight: 600; text-decoration: none; }
.auth-foot a:hover { color: #22d3ee; }
</style>

<div class="auth-bg">
  <div style="width:100%;max-width:460px;">
    <h1 class="auth-brand"><i class="fas fa-chart-line me-2"></i>FinTrack</h1>
    <p class="auth-sub">Welcome back! Log in to your account.</p>

    <div class="auth-card">
      <a href="{{ url_for('google.login') }}" class="btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" class="me-2">
        Continue with Google
      </a>

      <div class="divider"><span>or</span></div>

      <form method="POST">
        {% if form %}{{ form.hidden_tag() }}{% endif %}

        <div class="mb-3">
          <label class="auth-label">Email Address</label>
          <input type="email" name="email" class="auth-input" placeholder="you@example.com" required>
        </div>

        <div class="mb-3">
          <label class="auth-label">Password</label>
          <input type="password" name="password" class="auth-input" placeholder="Your password" required>
        </div>

        <button type="submit" class="btn-login">Login</button>
      </form>
    </div>

    <p class="auth-foot">
      Don't have an account? <a href="{{ url_for('auth.register') }}">Sign up free</a>
    </p>
  </div>
</div>

{% endblock %}
