{% extends "base.html" %}
{% block title %}Add Transaction - FinTrack{% endblock %}

{% block content %}
<style>
.sidebar-link { color:#475569 !important; border-radius:8px; padding:10px 14px !important; transition:.2s; text-decoration:none; }
.sidebar-link:hover { background:#f0fafd; color:#0f2942 !important; }
.sidebar-link.active { background:linear-gradient(135deg,#d4e8f0,#b8d8e6); color:#0f2942 !important; font-weight:600; border-left:3px solid #0891b2; }
.sidebar-link i { color:#0891b2; }
.sidebar-link.text-danger i { color:#dc2626; }

.form-label { color:#0f2942; }
.form-control, .form-select {
  border:1.5px solid #d4e2ec !important;
  border-radius:10px !important;
  background:#f8fafc !important;
  transition:.2s;
}
.form-control:focus, .form-select:focus {
  border-color:#0891b2 !important;
  box-shadow:0 0 0 3px rgba(8,145,178,.15) !important;
  background:#fff !important;
}

.btn-primary-custom {
  background:linear-gradient(135deg,#15304f 0%,#1f4a64 100%) !important;
  border:none !important;
  color:#fff !important;
  border-radius:10px !important;
  font-weight:600;
  transition:.2s;
}
.btn-primary-custom:hover {
  background:linear-gradient(135deg,#0891b2 0%,#0e7490 100%) !important;
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(8,145,178,.3);
  color:#fff !important;
}

.btn-cancel {
  background:#fff;
  border:1.5px solid #d4e2ec !important;
  color:#475569 !important;
  border-radius:10px !important;
  font-weight:600;
  transition:.2s;
}
.btn-cancel:hover {
  background:#f0fafd;
  color:#0f2942 !important;
  border-color:#0891b2 !important;
}

.btn-scan {
  background:linear-gradient(135deg, #0891b2 0%, #22d3ee 100%) !important;
  color:#fff !important;
  border:none;
  border-radius:12px;
  font-weight:600;
  transition:.2s;
}
.btn-scan:hover {
  background:linear-gradient(135deg, #0e7490 0%, #06b6d4 100%) !important;
  color:#fff !important;
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(8,145,178,.35);
}

.transaction-card {
  border-radius:16px;
  border:none;
  background:#fff;
}
</style>

<div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar d-flex flex-column p-3" style="width:240px; min-height:100vh; background:#fff; border-right:1px solid #d4e2ec;">
        <a class="navbar-brand fw-bold mb-4 ps-2" href="/" style="color:#0f2942;">
            <i class="fas fa-chart-line me-2" style="color:#0891b2;"></i>FinTrack
        </a>
        <nav class="nav flex-column gap-1">
            <a href="/dashboard" class="nav-link sidebar-link"><i class="fas fa-home me-2"></i> Dashboard</a>
            <a href="/transactions" class="nav-link sidebar-link active"><i class="fas fa-exchange-alt me-2"></i> Transactions</a>
            <a href="/budgets" class="nav-link sidebar-link"><i class="fas fa-wallet me-2"></i> Budgets</a>
            <a href="/goals" class="nav-link sidebar-link"><i class="fas fa-bullseye me-2"></i> Savings Goals</a>
            <a href="/analytics" class="nav-link sidebar-link"><i class="fas fa-chart-bar me-2"></i> Analytics</a>
            <a href="/recurring" class="nav-link sidebar-link"><i class="fas fa-redo me-2"></i> Recurring</a>
        </nav>
        <div class="mt-auto">
            <a href="/logout" class="nav-link sidebar-link text-danger"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
        </div>
    </div>

    <!-- Main -->
    <div class="flex-grow-1 p-4" style="background:#f8fafc; min-height:100vh;">
        <div style="max-width:700px;">
            <h1 class="fw-bold mb-4" style="color:#0f2942;">
                <i class="fas fa-plus-circle me-2" style="color:#0891b2;"></i>Add Transaction
            </h1>

            <a href="/receipts/scan" class="btn btn-scan w-100 py-3 mb-4">
                <i class="fas fa-camera me-2"></i> Scan Receipt with AI
            </a>

            <div class="card transaction-card shadow-sm p-4">
                <form method="POST" action="/transactions/add">
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Type</label>
                        <select name="transaction_type" class="form-select form-select-lg">
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                        </select>
                    </div>

                    <div class="row mb-4">
                        <div class="col">
                            <label class="form-label fw-semibold">Amount (₹)</label>
                            <input type="number" name="amount" step="0.01" min="0"
                                   class="form-control form-control-lg" placeholder="0.00" required>
                        </div>
                        <div class="col">
                            <label class="form-label fw-semibold">Account</label>
                            <select name="account_id" class="form-select form-select-lg">
                                {% for account in accounts %}
                                <option value="{{ account.id }}">
                                    {{ account.name }} (₹{{ "%.2f"|format(account.balance) }})
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Category</label>
                        <select name="category_id" class="form-select form-select-lg">
                            <option value="">Select category</option>
                            {% for category in categories %}
                            <option value="{{ category.id }}">{{ category.icon }} {{ category.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Date</label>
                        <input type="date" name="transaction_date" value="{{ today }}"
                               class="form-control form-control-lg" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Description</label>
                        <input type="text" name="description" class="form-control form-control-lg"
                               placeholder="Enter description">
                    </div>

                    <div class="d-flex gap-3 mt-4">
                        <a href="/transactions" class="btn btn-cancel flex-grow-1 py-3">Cancel</a>
                        <button type="submit" class="btn btn-primary-custom flex-grow-1 py-3">
                            <i class="fas fa-save me-2"></i>Create Transaction
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
