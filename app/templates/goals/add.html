{% extends "base.html" %}
{% block title %}New Savings Goal - FinTrack{% endblock %}

{% block content %}
<div class="d-flex">
    <div class="sidebar d-flex flex-column p-3" style="width:240px; min-height:100vh; background:#fff; border-right:1px solid #eee;">
        <a class="navbar-brand fw-bold mb-4 ps-2" href="/"><span style="color:#6c63ff;">Fin</span>Track</a>
        <nav class="nav flex-column gap-1">
            <a href="/dashboard" class="nav-link sidebar-link"><i class="fas fa-home me-2"></i> Dashboard</a>
            <a href="/transactions" class="nav-link sidebar-link"><i class="fas fa-exchange-alt me-2"></i> Transactions</a>
            <a href="/budgets" class="nav-link sidebar-link"><i class="fas fa-wallet me-2"></i> Budgets</a>
            <a href="/goals" class="nav-link sidebar-link active"><i class="fas fa-bullseye me-2"></i> Savings Goals</a>
            <a href="/analytics" class="nav-link sidebar-link"><i class="fas fa-chart-bar me-2"></i> Analytics</a>
            <a href="/recurring" class="nav-link sidebar-link"><i class="fas fa-redo me-2"></i> Recurring</a>
        </nav>
        <div class="mt-auto">
            <a href="/logout" class="nav-link sidebar-link text-danger"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
        </div>
    </div>

    <div class="flex-grow-1 p-4" style="background:#f8f9fa; max-width:600px;">
        <h1 class="fw-bold mb-4">New Savings Goal</h1>
        <div class="card border-0 shadow-sm p-4">
            <form method="POST" action="/goals/add">
                <div class="mb-4">
                    <label class="form-label fw-semibold">Goal Name</label>
                    <input type="text" name="name" class="form-control form-control-lg"
                           placeholder="e.g. Buy a laptop, Emergency fund" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Target Amount (₹)</label>
                    <input type="number" name="target_amount" step="0.01" min="1"
                           class="form-control form-control-lg" placeholder="e.g. 50000" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Target Date (optional)</label>
                    <input type="date" name="target_date" class="form-control form-control-lg">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Description (optional)</label>
                    <textarea name="description" class="form-control" rows="3"
                              placeholder="Why are you saving for this?"></textarea>
                </div>
                <div class="d-flex gap-3">
                    <a href="/goals" class="btn btn-outline-secondary flex-grow-1 py-3">Cancel</a>
                    <button type="submit" class="btn btn-primary flex-grow-1 py-3 fw-bold">
                        Create Goal
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
