{% extends "base.html" %}
{% block title %}New Savings Goal - FinTrack{% endblock %}

{% block content %}
<style>
.sidebar-link { color:#475569 !important; border-radius:8px; padding:10px 14px !important; transition:.2s; text-decoration:none; }
.sidebar-link:hover { background:#f0fafd; color:#0f2942 !important; }
.sidebar-link.active { background:linear-gradient(135deg,#d4e8f0,#b8d8e6); color:#0f2942 !important; font-weight:600; border-left:3px solid #0891b2; }
.sidebar-link i { color:#0891b2; }
.sidebar-link.text-danger i { color:#dc2626; }

.form-label { color:#0f2942; }
.form-control {
  border:1.5px solid #d4e2ec !important;
  border-radius:10px !important;
  background:#f8fafc !important;
  transition:.2s;
}
.form-control:focus {
  border-color:#0891b2 !important;
  box-shadow:0 0 0 3px rgba(8,145,178,.15) !important;
  background:#fff !important;
}

.btn-primary-custom {
  background:linear-gradient(135deg,#15304f 0%,#1f4a64 100%) !important;
  border:none !important;
  color:#fff !important;
  border-radius:10px !important;
  font-weight:600;
  transition:.2s;
}
.btn-primary-custom:hover {
  background:linear-gradient(135deg,#0891b2 0%,#0e7490 100%) !important;
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(8,145,178,.3);
  color:#fff !important;
}

.btn-cancel {
  background:#fff;
  border:1.5px solid #d4e2ec !important;
  color:#475569 !important;
  border-radius:10px !important;
  font-weight:600;
  transition:.2s;
}
.btn-cancel:hover {
  background:#f0fafd;
  color:#0f2942 !important;
  border-color:#0891b2 !important;
}
</style>

<div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar d-flex flex-column p-3" style="width:240px; min-height:100vh; background:#fff; border-right:1px solid #d4e2ec;">
        <a class="navbar-brand fw-bold mb-4 ps-2" href="/" style="color:#0f2942;">
            <i class="fas fa-chart-line me-2" style="color:#0891b2;"></i>FinTrack
        </a>
        <nav class="nav flex-column gap-1">
            <a href="/dashboard" class="nav-link sidebar-link"><i class="fas fa-home me-2"></i> Dashboard</a>
            <a href="/transactions" class="nav-link sidebar-link"><i class="fas fa-exchange-alt me-2"></i> Transactions</a>
            <a href="/budgets" class="nav-link sidebar-link"><i class="fas fa-wallet me-2"></i> Budgets</a>
            <a href="/goals" class="nav-link sidebar-link active"><i class="fas fa-bullseye me-2"></i> Savings Goals</a>
            <a href="/analytics" class="nav-link sidebar-link"><i class="fas fa-chart-bar me-2"></i> Analytics</a>
            <a href="/recurring" class="nav-link sidebar-link"><i class="fas fa-redo me-2"></i> Recurring</a>
        </nav>
        <div class="mt-auto">
            <a href="/logout" class="nav-link sidebar-link text-danger"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
        </div>
    </div>

    <!-- Main -->
    <div class="flex-grow-1 p-4" style="background:#f8fafc; min-height:100vh;">
        <div style="max-width:600px;">
            <h1 class="fw-bold mb-4" style="color:#0f2942;">
                <i class="fas fa-bullseye me-2" style="color:#0891b2;"></i>New Savings Goal
            </h1>
            <div class="card border-0 shadow-sm p-4" style="border-radius:16px;">
                <form method="POST" action="/goals/add">
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Goal Name</label>
                        <input type="text" name="name" class="form-control form-control-lg"
                               placeholder="e.g. Buy a laptop, Emergency fund" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Target Amount (₹)</label>
                        <input type="number" name="target_amount" step="0.01" min="1"
                               class="form-control form-control-lg" placeholder="e.g. 50000" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Target Date (optional)</label>
                        <input type="date" name="target_date" class="form-control form-control-lg">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Description (optional)</label>
                        <textarea name="description" class="form-control" rows="3"
                                  placeholder="Why are you saving for this?"></textarea>
                    </div>
                    <div class="d-flex gap-3">
                        <a href="/goals" class="btn btn-cancel flex-grow-1 py-3">Cancel</a>
                        <button type="submit" class="btn btn-primary-custom flex-grow-1 py-3">
                            <i class="fas fa-bullseye me-2"></i>Create Goal
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
