{% extends "base.html" %}
{% block title %}Add Account - FinTrack{% endblock %}

{% block content %}
<style>
.sidebar-link { color:#475569 !important; border-radius:8px; padding:10px 14px !important; transition:.2s; text-decoration:none; }
.sidebar-link:hover { background:#f0fafd; color:#0f2942 !important; }
.sidebar-link.active { background:linear-gradient(135deg,#d4e8f0,#b8d8e6); color:#0f2942 !important; font-weight:600; border-left:3px solid #0891b2; }
.sidebar-link i { color:#0891b2; }
.sidebar-link.text-danger i { color:#dc2626; }

.form-label { color:#0f2942; }
.form-control, .form-select {
  border:1.5px solid #d4e2ec !important;
  border-radius:10px !important;
  background:#f8fafc !important;
  transition:.2s;
}
.form-control:focus, .form-select:focus {
  border-color:#0891b2 !important;
  box-shadow:0 0 0 3px rgba(8,145,178,.15) !important;
  background:#fff !important;
}

.btn-primary-custom {
  background:linear-gradient(135deg,#15304f 0%,#1f4a64 100%) !important;
  border:none !important;
  color:#fff !important;
  border-radius:10px !important;
  font-weight:600;
  transition:.2s;
}
.btn-primary-custom:hover {
  background:linear-gradient(135deg,#0891b2 0%,#0e7490 100%) !important;
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(8,145,178,.3);
  color:#fff !important;
}

.btn-cancel {
  background:#fff;
  border:1.5px solid #d4e2ec !important;
  color:#475569 !important;
  border-radius:10px !important;
  font-weight:600;
  transition:.2s;
}
.btn-cancel:hover {
  background:#f0fafd;
  color:#0f2942 !important;
  border-color:#0891b2 !important;
}

.back-link { color:#64748b; transition:.2s; }
.back-link:hover { color:#0891b2 !important; }
</style>

<div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar d-flex flex-column p-3" style="width:240px; min-height:100vh; background:#fff; border-right:1px solid #d4e2ec;">
        <a class="navbar-brand fw-bold mb-4 ps-2" href="/" style="color:#0f2942;">
            <i class="fas fa-chart-line me-2" style="color:#0891b2;"></i>FinTrack
        </a>
        <nav class="nav flex-column gap-1">
            <a href="/dashboard" class="nav-link sidebar-link"><i class="fas fa-home me-2"></i> Dashboard</a>
            <a href="/transactions" class="nav-link sidebar-link"><i class="fas fa-exchange-alt me-2"></i> Transactions</a>
            <a href="/budgets" class="nav-link sidebar-link"><i class="fas fa-wallet me-2"></i> Budgets</a>
            <a href="/goals" class="nav-link sidebar-link"><i class="fas fa-bullseye me-2"></i> Savings Goals</a>
            <a href="/analytics" class="nav-link sidebar-link"><i class="fas fa-chart-bar me-2"></i> Analytics</a>
            <a href="/recurring" class="nav-link sidebar-link"><i class="fas fa-redo me-2"></i> Recurring</a>
        </nav>
        <div class="mt-auto">
            <a href="/logout" class="nav-link sidebar-link text-danger"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
        </div>
    </div>

    <!-- Main -->
    <div class="flex-grow-1 p-4" style="background:#f8fafc; min-height:100vh;">
        <div class="mb-4">
            <a href="/dashboard" class="text-decoration-none small back-link">
                <i class="fas fa-arrow-left me-1"></i> Back to Dashboard
            </a>
        </div>

        <h1 class="fw-bold mb-4" style="color:#0f2942;">
            <i class="fas fa-plus-circle me-2" style="color:#0891b2;"></i>Add New Account
        </h1>

        <div class="card border-0 shadow-sm p-4" style="max-width:500px; border-radius:16px;">
            <form method="POST" action="/accounts/add">
                <div class="mb-4">
                    <label class="form-label fw-semibold">Account Name</label>
                    <input type="text" name="name" class="form-control form-control-lg"
                           placeholder="e.g. Personal, Work, Savings" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Account Type</label>
                    <select name="account_type" class="form-select form-select-lg" required>
                        <option value="" disabled selected>Select type</option>
                        <option value="Current Account">Current Account</option>
                        <option value="Savings Account">Savings Account</option>
                        <option value="Cash">Cash</option>
                        <option value="Credit Card">Credit Card</option>
                        <option value="Investment">Investment</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Opening Balance (₹)</label>
                    <input type="number" name="balance" step="0.01" min="0"
                           class="form-control form-control-lg" placeholder="0.00" value="0">
                </div>

                <div class="d-flex gap-3 mt-4">
                    <a href="/dashboard" class="btn btn-cancel flex-grow-1 py-3">Cancel</a>
                    <button type="submit" class="btn btn-primary-custom flex-grow-1 py-3">
                        <i class="fas fa-plus me-2"></i>Create Account
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
